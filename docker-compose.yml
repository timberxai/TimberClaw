
services:
  openhands:
    build:
      context: ./
      dockerfile: ./containers/app/Dockerfile
    image: openhands:latest
    container_name: openhands-app-${DATE:-}
    environment:
      - AGENT_SERVER_IMAGE_REPOSITORY=${AGENT_SERVER_IMAGE_REPOSITORY:-ghcr.io/openhands/agent-server}
      - AGENT_SERVER_IMAGE_TAG=${AGENT_SERVER_IMAGE_TAG:-1.15.0-python}
      #- SANDBOX_USER_ID=${SANDBOX_USER_ID:-1234} # enable this only if you want a specific non-root sandbox user but you will have to manually adjust permissions of ~/.openhands for this user
      - WORKSPACE_MOUNT_PATH=${WORKSPACE_BASE:-$PWD/workspace}
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ~/.openhands:/.openhands
      - ${WORKSPACE_BASE:-$PWD/workspace}:/opt/workspace_base
    pull_policy: build
    stdin_open: true
    tty: true

  # TimberClaw Builder business API (Django) + PostgreSQL — PRD §6.1 / M0-01
  postgres:
    image: postgres:16-alpine
    container_name: timberclaw-postgres-${DATE:-}
    environment:
      POSTGRES_USER: timberclaw
      POSTGRES_PASSWORD: timberclaw
      POSTGRES_DB: timberclaw
    ports:
      - "${TC_POSTGRES_PORT:-5433}:5432"
    volumes:
      - tc_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timberclaw -d timberclaw"]
      interval: 5s
      timeout: 5s
      retries: 10

  tc-backend:
    build:
      context: ./timberclaw/backend
      dockerfile: Dockerfile
    image: timberclaw-backend:latest
    container_name: timberclaw-backend-${DATE:-}
    environment:
      DATABASE_URL: postgresql://timberclaw:timberclaw@postgres:5432/timberclaw
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "*"
    ports:
      - "${TC_BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  tc_pg_data:
